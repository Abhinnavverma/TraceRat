version: "3.9"

services:
  # ==========================
  # Infrastructure
  # ==========================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tracerat-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - tracerat-net
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tracerat-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - tracerat-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tracerat-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tracerat
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - tracerat-net

  neo4j:
    image: neo4j:5.18-community
    container_name: tracerat-neo4j
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/tracerat_dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - tracerat-net
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: tracerat-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tracerat
      POSTGRES_PASSWORD: tracerat_dev
      POSTGRES_DB: tracerat
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tracerat-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracerat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: tracerat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - tracerat-net
  # ==========================
  # Application Services
  # ==========================

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tracerat-api-gateway
    ports:
      - "8000:8000"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PR_EVENTS_TOPIC: pr-events
      KAFKA_CONSUMER_GROUP: tracerat
      # GitHub App
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: /app/secrets/github-app.pem
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: tracerat
      POSTGRES_PASSWORD: tracerat_dev
      POSTGRES_DB: tracerat
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tracerat_dev
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  diff-fetching-service:
    build:
      context: .
      dockerfile: diff-fetching-service/Dockerfile
    container_name: tracerat-diff-fetching-service
    ports:
      - "8001:8001"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PR_EVENTS_TOPIC: pr-events
      KAFKA_DIFF_METADATA_TOPIC: diff-metadata
      KAFKA_DIFF_CONTENT_TOPIC: diff-content
      KAFKA_CONSUMER_GROUP: diff-fetching-service
      # GitHub App
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: /app/secrets/github-app.pem
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  dependency-graph:
    build:
      context: .
      dockerfile: dependency-graph/Dockerfile
    container_name: tracerat-dependency-graph
    ports:
      - "8002:8002"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DIFF_METADATA_TOPIC: diff-metadata
      KAFKA_DELTA_GRAPH_TOPIC: delta-graph
      KAFKA_TELEMETRY_EVENTS_TOPIC: telemetry-events
      KAFKA_CONSUMER_GROUP: dependency-graph-service
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tracerat_dev
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  vectorization-service:
    build:
      context: .
      dockerfile: vectorization-service/Dockerfile
    container_name: tracerat-vectorization-service
    ports:
      - "8003:8003"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DIFF_CONTENT_TOPIC: diff-content
      KAFKA_PR_CONTEXT_TOPIC: pr-context
      KAFKA_CONSUMER_GROUP: vectorization-service
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION_NAME: pr-embeddings
      # Embedding
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-sentence-transformer}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-all-MiniLM-L6-v2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # GitHub App (for backfill)
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY_PATH: /app/secrets/github-app.pem
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    volumes:
      - ./secrets:/app/secrets:ro
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  prediction-service:
    build:
      context: .
      dockerfile: prediction-service/Dockerfile
    container_name: tracerat-prediction-service
    ports:
      - "8004:8004"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DELTA_GRAPH_TOPIC: delta-graph
      KAFKA_PR_CONTEXT_TOPIC: pr-context
      KAFKA_PREDICTION_RESULTS_TOPIC: prediction-results
      KAFKA_CONSUMER_GROUP: prediction-service
      # Prediction weights (optional overrides)
      PREDICTION_CHANGE_SIZE_WEIGHT: ${PREDICTION_CHANGE_SIZE_WEIGHT:-0.30}
      PREDICTION_DEPTH_WEIGHT: ${PREDICTION_DEPTH_WEIGHT:-0.25}
      PREDICTION_TRAFFIC_WEIGHT: ${PREDICTION_TRAFFIC_WEIGHT:-0.25}
      PREDICTION_HISTORY_WEIGHT: ${PREDICTION_HISTORY_WEIGHT:-0.20}
      PREDICTION_BUFFER_TTL_SECONDS: ${PREDICTION_BUFFER_TTL_SECONDS:-60}
      PREDICTION_SWEEP_INTERVAL_SECONDS: ${PREDICTION_SWEEP_INTERVAL_SECONDS:-10}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  prompt-generation-service:
    build:
      context: .
      dockerfile: prompt-generation-service/Dockerfile
    container_name: tracerat-prompt-generation-service
    ports:
      - "8005:8005"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_PREDICTION_RESULTS_TOPIC: prediction-results
      KAFKA_LLM_PROMPTS_TOPIC: llm-prompts
      KAFKA_CONSUMER_GROUP: prompt-generation-service
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  llm-service:
    build:
      context: .
      dockerfile: llm-service/Dockerfile
    container_name: tracerat-llm-service
    ports:
      - "8006:8006"
    environment:
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_LLM_PROMPTS_TOPIC: llm-prompts
      KAFKA_CONSUMER_GROUP: llm-service
      # LLM
      LLM_PROVIDER: gemini
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MAX_RETRIES: 3
      LLM_RETRY_BASE_DELAY: 1.0
      # Api-gateway
      API_GATEWAY_RESULTS_URL: http://api-gateway:8000/results
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tracerat-net
    restart: unless-stopped

  # ==========================
  # Monitoring
  # ==========================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: tracerat-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - tracerat-net
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.1
    container_name: tracerat-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: tracerat
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - tracerat-net
    restart: unless-stopped

volumes:
  zookeeper-data:
  kafka-data:
  neo4j-data:
  neo4j-logs:
  postgres-data:
  qdrant-data:
  prometheus-data:
  grafana-data:

networks:
  tracerat-net:
    driver: bridge
